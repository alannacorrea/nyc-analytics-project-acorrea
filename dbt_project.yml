name: 'nyc_analytics'
version: '1.0.0'
config-version: 2
# Some default settings for dbt
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
 - "target"
 - "dbt_packages"

# Set up models, which are basically SQL files, to create tables
models:
 nyc_analytics:
   +materialized: table

   assignment_work:
     staging:
       +materialized: table
       +schema: nyc_transit_restaurants_staging

     marts:
       +materialized: table
       +schema: nyc_transit_restaurants_marts
      
       shared:
         +materialized: table

       open_restaurant_apps:
         +materialized: table

       dot_311:
         +materialized: table

   project_work:
       staging:
         +materialized: table
         +schema: snow_complaints_pavement_rating_staging

       marts:
         +materialized: table
         +schema: snow_complaints_pavement_rating_marts
          
         shared:
           +materialized: table

         311_snow_complaints:
           +materialized: table

         street_pavement_rating:
           +materialized: table
